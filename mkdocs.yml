# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: Unity Wiki
theme:
  name: material
  palette: 
    - scheme: slate  # Dark mode by default
      primary: indigo
      accent: blue
  features:
    - navigation.tabs
    - search.suggest
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Recruitment: recruitment.md
  - Raid Info:
      - Info: raid-info.md
      - Guides:
          - Molten Core: guides/raids/molten-core.md
          - Blackwing Lair: guides/raids/blackwing-lair.md
          - Temple of Ahn'Qiraj: guides/raids/temple-of-ahnqiraj.md
          - Naxxramas: guides/raids/naxxramas.md