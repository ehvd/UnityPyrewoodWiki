# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: Unity Wiki

plugins:
  - search
  - macros

theme:
  logo: assets/images/logo.png
  name: material
  custom_dir: overrides
  palette: 
    - scheme: slate  # Dark mode by default
      primary: indigo
      accent: blue
  favicon: assets/images/logo.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - content.tooltips
  icon:
    admonition:
      abstract: material/clipboard-text
      bug: material/shield-bug
      danger: material/lightning-bolt-circle
      example: material/test-tube
      failure: material/close
      info: material/information
      note: material/note
      question: material/help-circle
      quote: material/format-quote-close
      success: material/check
      tip: material/fire
      warning: material/alert

extra:
  meta:
    - name: apple-mobile-web-app-capable
      content: yes
    - name: apple-mobile-web-app-status-bar-style
      content: default

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md

nav:
  - Home: index.md
  - Recruitment: recruitment.md
  - Raid Info:
      - Raid Info: raid-info.md
      - Guides:
          - Molten Core:
            - guides/raids/molten-core/index.md
            - Lucifron: guides/raids/molten-core/lucifron.md
            - Magmadar: guides/raids/molten-core/magmadar.md
            - Gehennas: guides/raids/molten-core/gehennas.md
            - Garr: guides/raids/molten-core/garr.md
            - Baron Geddon: guides/raids/molten-core/baron-geddon.md
            - Shazzrah: guides/raids/molten-core/shazzrah.md
            - Sulfuron Harbinger: guides/raids/molten-core/sulfuron-harbinger.md
            - Golemagg the Incinerator: guides/raids/molten-core/golemagg-the-incinerator.md
            - Majordomo Executus: guides/raids/molten-core/majordomo-executus.md
            - Ragnaros: guides/raids/molten-core/ragnaros.md
          - Blackwing Lair:
            - guides/raids/blackwing-lair/index.md
          - Temple of Ahn'Qiraj:
            - guides/raids/temple-of-ahnqiraj/index.md
          - Naxxramas:
            - guides/raids/naxxramas/index.md